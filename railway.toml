# Railway 배포 설정 (config as code).
# 이 파일의 값은 Railway 대시보드 설정보다 항상 우선합니다.
# 스키마: https://railway.com/railway.schema.json
# 문서:   https://docs.railway.com/config-as-code/reference
#
# Node 버전은 여기서 지정하지 않습니다. Railway의 기본 빌더 Railpack이
# package.json 의 engines.node(">=24")를 읽어 major 24로 해석하고,
# 최신 Node 24.x 를 설치합니다(Railpack은 범위 표기를 major 버전으로 단순화).
# 특정 패치까지 고정하려면 서비스 환경변수 RAILPACK_NODE_VERSION 을 쓰세요.

[build]
# Railpack = Railway의 현재 기본 빌더(2026, Nixpacks 대체).
# 기본값이 바뀌어도 흔들리지 않도록 명시합니다.
builder = "RAILPACK"

# 빌드만 수행합니다. 의존성 설치는 Railpack 의 install 단계가 이미 npm ci 로
# 처리하므로(워크스페이스 포함), 여기서 npm ci 를 또 부르면 안 됩니다.
# 실제 배포에서 확인: 중복 npm ci 는 이미 설치된 node_modules 를 지우려다
#   EBUSY: resource busy or locked, rmdir '/app/client/node_modules/.vite'
# 로 빌드가 실패합니다.
# 결과물: server/dist/index.cjs (서버 번들) + client/dist (정적 SPA).
buildCommand = "npm run build"

[deploy]
# 프로덕션 시작 명령. server/dist/index.cjs 를 실행하며, 이 서버가
# client/dist 를 같은 오리진에서 서빙합니다(NODE_ENV 불필요).
startCommand = "npm start"

# 배포 후 이 경로가 HTTP 200 을 반환해야 새 배포가 활성화됩니다.
# server 의 /healthz 라우트가 {"ok":true} 를 반환합니다.
# Railway는 주입한 PORT 로 헬스체크를 보내고, 서버는 process.env.PORT 를 사용합니다.
healthcheckPath = "/healthz"

# 크래시(비정상 종료) 시에만 재시작합니다.
# 주의: 재시작은 접속 중인 전원의 연결을 끊고 월드 상태를 초기화합니다.
restartPolicyType = "ON_FAILURE"
